{% extends "base.html" %}

{% block content %}
<div class="card p-3 mb-3">
    <h5>Edit Dashboard (Block Builder)</h5>
    <p><strong>Role:</strong> {{ role['name'] }}</p>

    <!-- Block selector -->
    <div class="mb-3">
        <label class="form-label">Add Block:</label>
        <select id="block_select" class="form-select">
            <option value="tasks_table">Tasks Table</option>
            <option value="employee_list">Employee List</option>
            <option value="stats_card">Stats</option>
        </select>
        <button class="btn btn-primary mt-2" onclick="addBlock()">Add Block</button>
    </div>

    <!-- Layout Editor -->
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Dashboard Layout (JSON):</label>
            <textarea id="layout_editor" name="layout" rows="15" class="form-control">{{ layout }}</textarea>
        </div>

        <button type="submit" class="btn btn-success">Save Dashboard</button>
    </form>
</div>

<footer class="text-center mt-4 mb-2 text-muted">
    Powered by Tech of the World
</footer>

<script>
let layout = [];

// Load existing layout
try {
    layout = JSON.parse(`{{ layout|safe }}`);
} catch {
    layout = [];
}

// Add block
function addBlock() {
    const type = document.getElementById("block_select").value;
    layout.push({ type: type });

    document.getElementById("layout_editor").value =
        JSON.stringify(layout, null, 2);
}

// Keep textarea updated
document.getElementById("layout_editor").value =
    JSON.stringify(layout, null, 2);
</script>

{% endblock %}
